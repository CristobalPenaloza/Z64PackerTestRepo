name: Z64 - YouTube upload

on:
  workflow_dispatch:

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - name: Setup YouTube Uploader
        uses: AnimMouse/setup-youtubeuploader@v2
        with:
          client_secrets: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          request_token: ${{ secrets.YOUTUBE_REQUEST_TOKEN }}

      - uses: actions/checkout@v3

      #- name: Set up Python ${{ matrix.python-version }}
      #  uses: actions/setup-python@v4
      #  with:
      #    python-version: "3.x"

      #- name: Install Python dependencies
      #  uses: py-actions/py-dependency-install@v4
      #  with:
      #    path: "z64packer/z64_yt_upload_python_requirements.txt"

      - name: Create and upload YouTube video
        run: |
          cd z64packer
          youtubeuploader -debug -filename "result.mp4" -metaJSON "metadata.json" -metaJSONout "metadata-out.json"
          cat metadata-out.json
